name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Super-Linter
    - uses: super-linter/super-linter@v6.6.0            
    - name: make
      run: make
    - name: make check
      run: make check

